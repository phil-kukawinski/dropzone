<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dropzone</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="button-row"></div>
    <div id="hud" style="display:none">
      <div class="stat"><span class="val" id="sv">0</span><span class="lbl">score</span></div>
      <div class="stat"><span class="val" id="bv">0</span><span class="lbl">best</span></div>
      <div class="stat"><span class="val" id="blv">3</span><span class="lbl">balls</span></div>
      <div class="stat"><span class="val" id="mv">x1</span><span class="lbl">multi</span></div>
      <div class="stat"><span class="val" id="rv">1</span><span class="lbl">round</span></div>
    </div>
    <div id="bars" style="display:none">
      <div class="bar-row"><span>streak</span><div class="bar-track"><div class="bar-fill" id="streak-fill"></div></div></div>
      <div class="bar-row"><span>target</span><div class="bar-track"><div class="bar-fill" id="progress-fill"></div></div><span id="target-label"></span></div>
    </div>
    <canvas id="gc"></canvas>
    <canvas id="ac" style="display:none"></canvas>
    <p id="msg"></p>
    <button id="rbtn">play again</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
